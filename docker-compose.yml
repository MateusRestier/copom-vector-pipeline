services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: copom_pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: copom
      POSTGRES_PASSWORD: copom
      POSTGRES_DB: copom_rag
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # NOTE: file bind-mounts from paths with spaces fail on Docker Desktop for Windows.
      # Apply the schema manually after first start — see README Quick Start.
    restart: unless-stopped

volumes:
  pgvector_data:
